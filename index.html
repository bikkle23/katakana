<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ワンワン！カタカナおさんぽ</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    background-color: #F1F8E9; /* やさしいパステルグリーン */
    font-family: 'UD デジタル 教科書体 N-R', 'Hiragino Maru Gothic ProN', 'Quicksand', sans-serif;
    color: #4E342E;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  #app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  .screen.active {
    display: flex;
  }

  h1.title {
    font-size: 8vmin;
    margin-bottom: 8vmin;
    color: #FF9800;
    text-shadow: 0.5vmin 0.5vmin 0px #FFF3E0;
    text-align: center;
    line-height: 1.4;
  }

  button {
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.1s, box-shadow 0.1s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .large-btn {
    font-size: 6vmin;
    padding: 4vmin 10vmin;
    background-color: #A5D6A7;
    color: #1B5E20;
    border-radius: 6vmin;
    box-shadow: 0 1.5vmin 0 #66BB6A;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 2vmin;
  }

  .large-btn:active {
    box-shadow: 0 0vmin 0 #66BB6A;
    transform: translateY(1.5vmin) scale(0.95);
  }

  #game-screen {
    justify-content: space-evenly;
    padding: 5dvh 0;
  }

  #progress-container {
    width: 75vw;
    height: 4vmin;
    background-color: #CFD8DC;
    border-radius: 2vmin;
    position: relative;
    display: flex;
    align-items: center;
  }

  #dog-icon {
    font-size: 9vmin;
    position: absolute;
    left: 0%;
    transform: translateX(-50%);
    margin-top: -1vmin;
    transition: left 0.5s ease-out;
    z-index: 2;
  }

  @keyframes shake {
    0% { transform: translateX(-50%) rotate(0deg); }
    25% { transform: translateX(-50%) rotate(-15deg); }
    50% { transform: translateX(-50%) rotate(15deg); }
    75% { transform: translateX(-50%) rotate(-15deg); }
    100% { transform: translateX(-50%) rotate(0deg); }
  }

  .shake {
    animation: shake 0.5s;
  }

  #goal-icon {
    position: absolute;
    left: 102%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9vmin;
    z-index: 1;
  }

  #question-text {
    text-align: center;
    background: #FFFFFF;
    padding: 4vmin 8vmin;
    border-radius: 4vmin;
    box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.05);
  }

  #target-kana {
    color: #E64A19;
    font-size: 16vmin;
    line-height: 1.1;
    display: inline-block;
    margin-bottom: 2vmin;
    font-weight: bold;
  }

  .task-sub-text {
    font-size: 5.5vmin;
    color: #5D4037;
    font-weight: normal;
  }

  #choices-container {
    display: flex;
    gap: 5vw;
    justify-content: center;
    width: 100%;
  }

  .choice-btn {
    width: 26vmin;
    height: 26vmin;
    font-size: 12vmin;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #FFE082;
    box-shadow: 0 1.5vmin 0 #FFB300;
    border-radius: 5vmin;
    color: #4E342E;
  }

  .choice-btn:active {
    box-shadow: 0 0vmin 0 #FFB300;
    transform: translateY(1.5vmin) scale(0.95);
  }

  .bone-icon {
    font-size: 5vmin;
    margin-bottom: -1vmin;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100vw; height: 100dvh;
    pointer-events: none;
    z-index: 10;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    font-size: 6vmin;
    top: -10vh;
    animation: fall forwards linear;
  }

  @keyframes fall {
    to { transform: translateY(120dvh) rotate(360deg); }
  }

</style>
</head>
<body>

<div id="app">
  <!-- スタート画面 -->
  <div id="start-screen" class="screen active">
    <h1 class="title">🐶ワンワン！<br>カタカナおさんぽ🐾</h1>
    <button id="start-btn" class="large-btn">スタート🐶</button>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen" class="screen">
    <div id="progress-container">
      <div id="dog-icon">🐶</div>
      <div id="goal-icon">🏠</div>
    </div>
    
    <div id="question-text">
      <span id="target-kana"></span><br>
      <span class="task-sub-text">を さがしてね！</span>
    </div>
    
    <div id="choices-container">
      <button class="choice-btn" id="choice-0"></button>
      <button class="choice-btn" id="choice-1"></button>
      <button class="choice-btn" id="choice-2"></button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" class="screen">
    <h1 class="title">ゴール！<br>よくできました！🎉</h1>
    <div style="font-size: 16vmin; margin-bottom: 6vmin;">🐶🏠</div>
    <button id="restart-btn" class="large-btn">もういっかい🐾</button>
  </div>
</div>

<div id="overlay"></div>

<script>
  let audioCtx = null;
  const originalQuestions = [
    { answer: 'シ', hiragana: 'し', dummies: ['ツ', 'ン'] },
    { answer: 'ソ', hiragana: 'そ', dummies: ['ン', 'ツ'] },
    { answer: 'ア', hiragana: 'あ', dummies: ['マ', 'ヤ'] },
    { answer: 'ウ', hiragana: 'う', dummies: ['ワ', 'フ'] },
    { answer: 'チ', hiragana: 'ち', dummies: ['テ', 'ナ'] },
    { answer: 'ス', hiragana: 'す', dummies: ['ヌ', 'マ'] },
    { answer: 'ク', hiragana: 'く', dummies: ['ケ', 'タ'] },
    { answer: 'コ', hiragana: 'こ', dummies: ['ユ', 'ヨ'] },
    { answer: 'ネ', hiragana: 'ね', dummies: ['ヌ', 'ホ'] },
    { answer: 'ル', hiragana: 'る', dummies: ['レ', 'ハ'] }
  ];
  let currentQuestions = [];
  let currentIndex = 0;
  let isAnimating = false;

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', initTitleScreen);

  // 配列のシャッフル関数 (Fisher-Yates)
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  // AudioContextの生成とアンロック
  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    // iOS Safari向けに無音オシレーターを鳴らしてロック解除
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.value = 0;
    osc.start();
    osc.stop(audioCtx.currentTime + 0.01);
  }

  function playCorrect() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(659.25, t); // E5
    osc.frequency.setValueAtTime(1046.50, t + 0.1); // C6
    
    // ポップノイズ防止用のエンベロープ（アタックとリリース）
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.4, t + 0.05);
    gain.gain.linearRampToValueAtTime(0, t + 0.5);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.6);
  }

  function playIncorrect() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'square';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.setValueAtTime(140, t + 0.15); // 少し下げる
    
    // ポップノイズ防止用のエンベロープ (音量を抑えめに)
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 0.05);
    gain.gain.linearRampToValueAtTime(0.1, t + 0.3);
    gain.gain.linearRampToValueAtTime(0, t + 0.4);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.5);
  }

  function playResult() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523.25, t); // C5
    osc.frequency.setValueAtTime(659.25, t + 0.15); // E5
    osc.frequency.setValueAtTime(783.99, t + 0.3); // G5
    osc.frequency.setValueAtTime(1046.50, t + 0.45); // C6
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.4, t + 0.1);
    gain.gain.linearRampToValueAtTime(0.4, t + 0.6);
    gain.gain.linearRampToValueAtTime(0, t + 0.8);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.9);
  }

  function startGame() {
    unlockAudio();
    currentQuestions = shuffle([...originalQuestions]);
    currentIndex = 0;
    
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    
    updateProgress(0);
    nextQuestion();
  }

  function initTitleScreen() {
    clearConfetti();
    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('start-screen').classList.add('active');
  }

  function nextQuestion() {
    if (currentIndex >= currentQuestions.length) {
      showResult();
      return;
    }
    
    const q = currentQuestions[currentIndex];
    document.getElementById('target-kana').innerText = q.hiragana;
    
    const choices = [q.answer, ...q.dummies];
    shuffle(choices);
    
    const choiceBtns = document.querySelectorAll('.choice-btn');
    choiceBtns.forEach((btn, i) => {
      btn.innerHTML = `<span class="bone-icon">🦴</span><span>${choices[i]}</span>`;
      btn.onclick = () => handleChoice(choices[i] === q.answer);
    });
  }

  function updateProgress(index) {
    const percent = (index / originalQuestions.length) * 100;
    document.getElementById('dog-icon').style.left = `${percent}%`;
  }

  function handleChoice(isCorrect) {
    if (isAnimating) return;
    isAnimating = true;
    
    // 連打防止のため画面の操作を無効化
    document.getElementById('game-screen').style.pointerEvents = 'none';

    if (isCorrect) {
      playCorrect();
      currentIndex++;
      updateProgress(currentIndex);
      
      setTimeout(() => {
        isAnimating = false;
        document.getElementById('game-screen').style.pointerEvents = '';
        nextQuestion();
      }, 1200);
    } else {
      playIncorrect();
      const dog = document.getElementById('dog-icon');
      dog.classList.add('shake');
      
      setTimeout(() => {
        dog.classList.remove('shake');
      }, 500);
      
      setTimeout(() => {
        isAnimating = false;
        document.getElementById('game-screen').style.pointerEvents = '';
      }, 800);
    }
  }

  function showResult() {
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');
    playResult();
    showConfetti();
  }

  function showConfetti() {
    const overlay = document.getElementById('overlay');
    overlay.innerHTML = '';
    const emojis = ['🐾', '🌸', '✨', '🎉', '🦴'];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (Math.random() * 2 + 2) + 's';
      el.style.animationDelay = (Math.random() * 1) + 's';
      overlay.appendChild(el);
    }
  }

  function clearConfetti() {
    document.getElementById('overlay').innerHTML = '';
  }
</script>

</body>
</html>
